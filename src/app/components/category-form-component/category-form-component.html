<div class="container">
    <div class="card border-0 shadow bg-light p-4 mt-5">

        <h1 class="text-muted text-center">Ajouter une catégorie</h1>
        <form [formGroup]="formulaire" (ngSubmit)="sendForm()">
            <div class="mb-3">
                <label for="name" class="form-label">Nom de la catégorie</label>
                <input type="text" class="form-control" id="name" formControlName="name" />
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description de la catégorie</label>
                <textarea
                class="form-control"
                id="description"
                rows="3"
                formControlName="description"
                ></textarea>
            </div>
            <button type="submit" class="btn btn-info">Créer</button>
        </form>
    </div>
</div>
